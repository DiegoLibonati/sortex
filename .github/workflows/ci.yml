name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: pip-audit
        run: pip-audit --skip-editable

  test:
    runs-on: ubuntu-latest
    needs: lint-and-audit

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install test dependencies
        run: pip install -e ".[test]"

      - name: Install Tkinter and virtual display
        run: sudo apt-get install -y python3-tk xvfb

      - name: Run tests
        run: xvfb-run python -m pytest --tb=short

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build dependencies
        run: pip install -e ".[build]"

      - name: Create dummy .env for CI
        run: cp .env.example.prod .env

      - name: Build executable
        run: pyinstaller app.spec

      - name: Verify executable exists
        run: |
          EXE=$(find dist -maxdepth 1 \( -name "app" -o -name "app.exe" \) | head -1)
          if [ -z "$EXE" ]; then
            echo "ERROR: executable not found in dist/"
            exit 1
          fi
          echo "OK: $EXE ($(du -h "$EXE" | cut -f1))"