name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint-and-audit:
    name: Lint & Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy --config-file=pyproject.toml .

      - name: pip-audit
        run: pip-audit --skip-editable

  test:
    name: Testing
    runs-on: ubuntu-latest
    needs: lint-and-audit

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install test dependencies
        run: pip install -e ".[test]"

      - name: Install Tkinter and virtual display
        run: sudo apt-get install -y python3-tk xvfb

      - name: Run tests
        run: xvfb-run python -m pytest --tb=short

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build dependencies
        run: pip install -e ".[build]"

      - name: Create dummy .env for CI
        run: cp .env.example.prod .env

      - name: Build executable
        run: pyinstaller app.spec

      - name: Verify executable exists
        run: |
          EXE=$(find dist -maxdepth 1 \( -name "app" -o -name "app.exe" \) | head -1)
          if [ -z "$EXE" ]; then
            echo "ERROR: executable not found in dist/"
            exit 1
          fi
          echo "OK: $EXE ($(du -h "$EXE" | cut -f1))"

  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(release):') && !contains(github.event.head_commit.message, '[skip release]')
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9.21.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          vcs_release: false

  build-windows-exe:
    name: Build .exe
    runs-on: windows-latest
    needs: prepare-release
    if: needs.prepare-release.outputs.released == 'true'

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build dependencies
        run: pip install -e ".[build]"

      - name: Create dummy .env for build
        shell: pwsh
        run: Copy-Item .env.example.prod .env

      - name: Build executable
        run: pyinstaller app.spec

      - name: Rename artifact
        shell: pwsh
        run: |
          $version = "${{ needs.prepare-release.outputs.tag }}"
          $newName = "sortex-$version-windows.exe"
          Move-Item dist/app.exe "dist/$newName"

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/*.exe
          retention-days: 1

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [prepare-release, build-windows-exe]
    if: needs.prepare-release.outputs.released == 'true'

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
          fetch-depth: 0

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: dist

      - name: Publish to GitHub Release
        uses: python-semantic-release/publish-action@v9.21.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.prepare-release.outputs.tag }}